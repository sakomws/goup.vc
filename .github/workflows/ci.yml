name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  changes:
    permissions:
      pull-requests: read
    runs-on: ubuntu-latest
    outputs:
      database: ${{ steps.filter.outputs.database }}
      database_contracts: ${{ steps.filter.outputs.database_contracts }}
      dependencies: ${{ steps.filter.outputs.dependencies }}
      javascript: ${{ steps.filter.outputs.javascript }}
      markdown: ${{ steps.filter.outputs.markdown }}
      mcp: ${{ steps.filter.outputs.mcp }}
      server: ${{ steps.filter.outputs.server }}
      templates: ${{ steps.filter.outputs.templates }}
    steps:
      - name: Determine changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            database:
              - '.github/workflows/ci.yml'
              - '.github/workflows/tern.conf'
              - 'database/**'
            database_contracts:
              - '.github/workflows/ci.yml'
              - 'Cargo.lock'
              - 'Cargo.toml'
              - 'database/**'
              - 'justfile'
              - 'ocg-server/Cargo.toml'
              - 'ocg-server/src/db.rs'
              - 'ocg-server/src/db/**'
              - 'ocg-server/src/templates.rs'
              - 'ocg-server/src/templates/**'
              - 'ocg-server/src/types.rs'
              - 'ocg-server/src/types/**'
            dependencies:
              - '.github/workflows/ci.yml'
              - '**/Cargo.lock'
              - '**/Cargo.toml'
              - '.cargo/audit.toml'
            javascript:
              - '.github/workflows/ci.yml'
              - 'tests/unit/**'
              - 'ocg-server/static/js/**'
              - 'ocg-server/static/js/.prettierrc.yaml'
              - 'tests/unit/package-lock.json'
            markdown:
              - '.github/workflows/ci.yml'
              - '**/*.md'
            mcp:
              - '.github/workflows/ci.yml'
              - 'mcp/**'
            server:
              - '.github/workflows/ci.yml'
              - '.rustfmt.toml'
              - 'Cargo.lock'
              - 'Cargo.toml'
              - 'ocg-redirector/**'
              - 'ocg-server/**'
            templates:
              - '.github/workflows/ci.yml'
              - 'ocg-server/templates/**'
              - 'ocg-server/templates/.djlintrc'

  audit-dependencies:
    needs: changes
    if: needs.changes.outputs.dependencies == 'true'
    permissions:
      checks: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Run cargo audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  check-js-files-format:
    needs: changes
    if: needs.changes.outputs.javascript == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Run prettier
        uses: creyD/prettier_action@v4.6
        with:
          dry: true
          prettier_options: --check ocg-server/static/js/**/*.js --config ocg-server/static/js/.prettierrc.yaml

  lint-and-test-server:
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: clippy, rustfmt
      - name: Install Tailwind CSS
        run: |
          wget -O /usr/local/bin/tailwindcss https://github.com/tailwindlabs/tailwindcss/releases/download/v4.1.10/tailwindcss-linux-x64
          chmod +x /usr/local/bin/tailwindcss
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- --deny warnings
      - name: Run rustfmt
        run: cargo fmt --all -- --check
      - name: Run tests
        run: cargo test

  lint-markdown-files:
    needs: changes
    if: needs.changes.outputs.markdown == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v22
        with:
          globs: '**/*.md'

  lint-templates:
    needs: changes
    if: needs.changes.outputs.templates == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install djlint
        run: pip install djlint==1.36.4
      - name: Run djlint
        run: |
          djlint \
            --check \
            --configuration ocg-server/templates/.djlintrc \
            ocg-server/templates

  test-database:
    needs: changes
    if: needs.changes.outputs.database == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_USER: tests
          POSTGRES_PASSWORD: tests
          POSTGRES_DB: tests
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install PostgreSQL, pgTAP, and tern clients
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client pgtap
          curl -sL https://github.com/jackc/tern/releases/download/v2.3.2/tern_2.3.2_linux_amd64.tar.gz -o tern.tar.gz
          tar -xzf tern.tar.gz
          sudo mv tern /usr/local/bin/tern
      - name: Install pgTAP extension in PostgreSQL service
        run: |
          docker exec -u root ${{ job.services.postgres.id }} sh -lc \
            'apt-get update && (apt-get install -y postgresql-17-pgtap || apt-get install -y pgtap)'
      - name: Create database test tern config
        run: |
          cat >/tmp/ocg-tern-tests.conf <<EOF
          [database]
          host = 127.0.0.1
          port = ${{ job.services.postgres.ports[5432] }}
          database = tests
          user = tests
          password = tests
          EOF
      - name: Apply database migrations
        working-directory: ./database/migrations
        run: TERN_CONF=/tmp/ocg-tern-tests.conf ./migrate.sh
      - name: Install pgtap database extension
        run: PGPASSWORD=tests psql -h 127.0.0.1 -p ${{ job.services.postgres.ports[5432] }} -U tests tests -c 'create extension pgtap;'
      - name: Run database tests
        working-directory: ./database/tests
        run: PGPASSWORD=tests pg_prove --host 127.0.0.1 --port ${{ job.services.postgres.ports[5432] }} --dbname tests --username tests --verbose schema/*.sql functions/*/*.sql

  test-database-contracts:
    needs: changes
    if: needs.changes.outputs.database_contracts == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_USER: tests
          POSTGRES_PASSWORD: tests
          POSTGRES_DB: tests
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - name: Install just
        uses: taiki-e/install-action@just
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Install Tailwind CSS
        run: |
          wget -O /usr/local/bin/tailwindcss https://github.com/tailwindlabs/tailwindcss/releases/download/v4.1.10/tailwindcss-linux-x64
          chmod +x /usr/local/bin/tailwindcss
      - name: Install tern
        run: |
          curl -sL https://github.com/jackc/tern/releases/download/v2.3.2/tern_2.3.2_linux_amd64.tar.gz -o tern.tar.gz
          tar -xzf tern.tar.gz
          sudo mv tern /usr/local/bin/tern
      - name: Create contract test tern config
        run: |
          mkdir -p /tmp/ocg
          cat >/tmp/ocg/tern-tests-contract.conf <<EOF
          [database]
          host = 127.0.0.1
          port = ${{ job.services.postgres.ports[5432] }}
          database = ocg_tests_contract
          user = tests
          password = tests
          EOF
      - name: Run database contract tests
        env:
          OCG_CONFIG: /tmp/ocg
          OCG_DB_HOST: 127.0.0.1
          OCG_DB_PORT: ${{ job.services.postgres.ports[5432] }}
          OCG_DB_PASSWORD: tests
          OCG_DB_USER: tests
          OCG_PG_BIN: /usr/bin
        run: just db-contract-tests

  test-frontend:
    needs: changes
    if: needs.changes.outputs.javascript == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tests/unit/package-lock.json
      - name: Install frontend unit test dependencies
        working-directory: tests/unit
        run: npm ci
      - name: Install Playwright browser for frontend unit tests
        working-directory: tests/unit
        run: npx playwright install --with-deps chromium
      - name: Run frontend unit tests
        working-directory: tests/unit
        run: npm test

  test-mcp:
    needs: changes
    if: needs.changes.outputs.mcp == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Check MCP server syntax
        run: node --check mcp/server.mjs
      - name: Validate MCP tool catalog
        run: node -e "JSON.parse(require('fs').readFileSync('mcp/tools.json', 'utf8'))"
