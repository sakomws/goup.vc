<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040" role="img" aria-labelledby="title desc">
  <title id="title">GOUP architecture diagram</title>
  <desc id="desc">A technical architecture diagram for GOUP showing clients, Cloudflare edge, Rust Axum application, PostgreSQL, AWS SES notifications, MCP automation, assets, and operational workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf8f3"/>
      <stop offset="55%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="app" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f2a24"/>
      <stop offset="100%" stop-color="#57534e"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#f5efe7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0c0a09" flood-opacity="0.14"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0c0a09" flood-opacity="0.09"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#78716c"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#15803d"/>
    </marker>
    <style>
      .title { font: 900 44px Inter, Arial, sans-serif; fill: #1c1917; letter-spacing: -1.4px; }
      .subtitle { font: 500 18px/1.5 Inter, Arial, sans-serif; fill: #57534e; }
      .eyebrow { font: 900 12px Inter, Arial, sans-serif; fill: #78716c; letter-spacing: 2.4px; }
      .card-title { font: 900 22px Inter, Arial, sans-serif; fill: #1c1917; letter-spacing: -0.4px; }
      .card-title-light { font: 900 22px Inter, Arial, sans-serif; fill: #ffffff; letter-spacing: -0.4px; }
      .body { font: 500 14px Inter, Arial, sans-serif; fill: #57534e; }
      .body-dark { font: 500 14px Inter, Arial, sans-serif; fill: #d6d3d1; }
      .small { font: 800 12px Inter, Arial, sans-serif; fill: #78716c; letter-spacing: 0.8px; }
      .chip { font: 800 12px Inter, Arial, sans-serif; fill: #44403c; }
      .label { font: 800 13px Inter, Arial, sans-serif; fill: #44403c; }
      .line { fill: none; stroke: #78716c; stroke-width: 3; marker-end: url(#arrow); }
      .line-soft { fill: none; stroke: #a8a29e; stroke-width: 2; stroke-dasharray: 8 8; marker-end: url(#arrow); }
      .line-green { fill: none; stroke: #15803d; stroke-width: 3; marker-end: url(#arrowGreen); }
    </style>
    <symbol id="bullet" viewBox="0 0 8 8">
      <circle cx="4" cy="4" r="4" fill="#a8a29e"/>
    </symbol>
    <symbol id="bulletGreen" viewBox="0 0 8 8">
      <circle cx="4" cy="4" r="4" fill="#15803d"/>
    </symbol>
    <symbol id="bulletBlue" viewBox="0 0 8 8">
      <circle cx="4" cy="4" r="4" fill="#2563eb"/>
    </symbol>
  </defs>

  <rect width="1600" height="1040" rx="44" fill="url(#bg)"/>
  <circle cx="1410" cy="120" r="220" fill="#fde68a" opacity="0.28"/>
  <circle cx="170" cy="920" r="260" fill="#bfdbfe" opacity="0.20"/>
  <circle cx="1340" cy="920" r="230" fill="#bbf7d0" opacity="0.20"/>

  <text x="72" y="78" class="title">GOUP Technical Architecture</text>
  <text x="72" y="115" class="subtitle">Server-rendered Rust app with HTMX, SQL-first data workflows, Cloudflare edge, AWS SES notifications, and MCP automation.</text>

  <!-- Clients -->
  <g filter="url(#shadow)">
    <rect x="70" y="165" width="270" height="295" rx="28" fill="#ffffff"/>
    <text x="100" y="205" class="eyebrow">CLIENTS</text>
    <text x="100" y="238" class="card-title">Browsers + Agents</text>
    <g class="body">
      <use href="#bulletGreen" x="100" y="278" width="8" height="8"/><text x="116" y="286">Public visitors</text>
      <use href="#bulletGreen" x="100" y="314" width="8" height="8"/><text x="116" y="322">Members and mentors</text>
      <use href="#bulletGreen" x="100" y="350" width="8" height="8"/><text x="116" y="358">Group leads</text>
      <use href="#bulletGreen" x="100" y="386" width="8" height="8"/><text x="116" y="394">Alliance admins</text>
      <use href="#bulletGreen" x="100" y="422" width="8" height="8"/><text x="116" y="430">MCP / API operators</text>
    </g>
  </g>

  <!-- Edge -->
  <g filter="url(#shadow)">
    <rect x="410" y="165" width="250" height="295" rx="28" fill="url(#warm)"/>
    <text x="440" y="205" class="eyebrow">EDGE</text>
    <text x="440" y="238" class="card-title">Cloudflare</text>
    <g class="body">
      <use href="#bullet" x="440" y="278" width="8" height="8"/><text x="456" y="286">DNS + TLS termination</text>
      <use href="#bullet" x="440" y="314" width="8" height="8"/><text x="456" y="322">WAF / bot protection</text>
      <use href="#bullet" x="440" y="350" width="8" height="8"/><text x="456" y="358">Static asset caching</text>
      <use href="#bullet" x="440" y="386" width="8" height="8"/><text x="456" y="394">HTTP routing to origin</text>
      <use href="#bullet" x="440" y="422" width="8" height="8"/><text x="456" y="430">Cache headers + ETags</text>
    </g>
  </g>

  <!-- Application -->
  <g filter="url(#shadow)">
    <rect x="730" y="145" width="420" height="520" rx="34" fill="url(#app)"/>
    <text x="770" y="190" fill="#f5efe7" class="eyebrow">RUST ORIGIN</text>
    <text x="770" y="226" class="card-title-light">ocg-server</text>
    <text x="770" y="254" class="body-dark">Axum request router, Askama templates, tower middleware.</text>

    <rect x="770" y="292" width="340" height="58" rx="18" fill="#ffffff" opacity="0.10"/>
    <text x="790" y="325" fill="#ffffff" class="label">Handlers: site, auth, dashboards, APIs</text>

    <rect x="770" y="365" width="340" height="58" rx="18" fill="#ffffff" opacity="0.10"/>
    <text x="790" y="398" fill="#ffffff" class="label">Templates: Askama HTML + HTMX partials</text>

    <rect x="770" y="438" width="340" height="58" rx="18" fill="#ffffff" opacity="0.10"/>
    <text x="790" y="471" fill="#ffffff" class="label">Frontend: HTMX, custom elements, Leaflet</text>

    <rect x="770" y="511" width="340" height="58" rx="18" fill="#ffffff" opacity="0.10"/>
    <text x="790" y="544" fill="#ffffff" class="label">Auth/session, permissions, audit events</text>

    <rect x="770" y="584" width="340" height="44" rx="16" fill="#ffffff" opacity="0.10"/>
    <text x="790" y="611" fill="#ffffff" class="label">Notifications manager + email rendering</text>
  </g>

  <!-- Data -->
  <g filter="url(#shadow)">
    <rect x="1230" y="165" width="300" height="360" rx="28" fill="#ffffff"/>
    <text x="1260" y="205" class="eyebrow">DATA LAYER</text>
    <text x="1260" y="238" class="card-title">PostgreSQL</text>
    <g class="body">
      <use href="#bulletBlue" x="1260" y="278" width="8" height="8"/><text x="1276" y="286">Tern migrations</text>
      <use href="#bulletBlue" x="1260" y="314" width="8" height="8"/><text x="1276" y="322">SQL functions as API</text>
      <use href="#bulletBlue" x="1260" y="350" width="8" height="8"/><text x="1276" y="358">Auth sessions + RBAC</text>
      <use href="#bulletBlue" x="1260" y="386" width="8" height="8"/><text x="1276" y="394">Groups, events, jobs</text>
      <use href="#bulletBlue" x="1260" y="422" width="8" height="8"/><text x="1276" y="430">Mentorship requests</text>
      <use href="#bulletBlue" x="1260" y="458" width="8" height="8"/><text x="1276" y="466">Landscape + PostGIS map data</text>
      <use href="#bulletBlue" x="1260" y="494" width="8" height="8"/><text x="1276" y="502">Audit logs and metrics</text>
    </g>
  </g>

  <!-- External services -->
  <g filter="url(#shadow)">
    <rect x="1230" y="585" width="300" height="245" rx="28" fill="#ffffff"/>
    <text x="1260" y="625" class="eyebrow">EXTERNAL SERVICES</text>
    <text x="1260" y="658" class="card-title">AWS + Integrations</text>
    <g class="body">
      <use href="#bulletGreen" x="1260" y="700" width="8" height="8"/><text x="1276" y="708">AWS SES: transactional email</text>
      <use href="#bulletGreen" x="1260" y="736" width="8" height="8"/><text x="1276" y="744">Image/storage provider hooks</text>
      <use href="#bulletGreen" x="1260" y="772" width="8" height="8"/><text x="1276" y="780">Meeting/payment providers</text>
      <use href="#bulletGreen" x="1260" y="808" width="8" height="8"/><text x="1276" y="816">RSS / docs / source feeds</text>
    </g>
  </g>

  <!-- MCP / automation -->
  <g filter="url(#shadow)">
    <rect x="70" y="540" width="590" height="290" rx="30" fill="#ffffff"/>
    <text x="100" y="582" class="eyebrow">AUTOMATION + TOOLS</text>
    <text x="100" y="616" class="card-title">MCP Server + Admin Actions</text>
    <text x="100" y="644" class="body">Node MCP server exposes governed actions for operational workflows.</text>

    <rect x="100" y="680" width="160" height="70" rx="18" fill="#f5f0e8"/>
    <text x="120" y="710" class="label">mcp/server.mjs</text>
    <text x="120" y="732" class="body">JSON-RPC tools</text>

    <rect x="285" y="680" width="160" height="70" rx="18" fill="#f5f0e8"/>
    <text x="305" y="710" class="label">tools.json</text>
    <text x="305" y="732" class="body">schemas + scopes</text>

    <rect x="470" y="680" width="160" height="70" rx="18" fill="#f5f0e8"/>
    <text x="490" y="710" class="label">Landscape writes</text>
    <text x="490" y="732" class="body">startups/projects</text>

    <g class="body">
      <text x="100" y="785">Use cases: create startup, create GitHub project, search landscape, inspect data.</text>
      <text x="100" y="812">Access: authenticated actor IDs, API scopes, SQL validation, audit-friendly mutations.</text>
    </g>
  </g>

  <!-- Build / delivery -->
  <g filter="url(#shadow)">
    <rect x="730" y="730" width="420" height="180" rx="30" fill="#ffffff"/>
    <text x="760" y="772" class="eyebrow">BUILD + DELIVERY</text>
    <text x="760" y="805" class="card-title">Assets and Releases</text>
    <g class="body">
      <use href="#bullet" x="760" y="842" width="8" height="8"/><text x="776" y="850">Tailwind v4 builds styles.css</text>
      <use href="#bullet" x="760" y="876" width="8" height="8"/><text x="776" y="884">Rust build.rs hashes static assets</text>
      <use href="#bullet" x="980" y="842" width="8" height="8"/><text x="996" y="850">dist/templates rewritten to hashed paths</text>
      <use href="#bullet" x="980" y="876" width="8" height="8"/><text x="996" y="884">Cargo binary embeds dist/static</text>
    </g>
  </g>

  <!-- Product surfaces -->
  <g filter="url(#softShadow)">
    <rect x="70" y="910" width="1460" height="78" rx="24" fill="#ffffff"/>
    <text x="105" y="958" class="card-title">Product surfaces</text>
    <text x="305" y="958" class="body">Explore map, groups, events, jobs, mentorship, member directories, sponsor, docs, Tech News, stats, landscape, and dashboards.</text>
  </g>

  <!-- Flows -->
  <path class="line" d="M350 310 C375 310 385 310 400 310"/>
  <path class="line" d="M670 310 C695 310 705 310 720 310"/>
  <path class="line" d="M1160 335 C1190 335 1200 335 1220 335"/>
  <path class="line-green" d="M1158 610 C1190 640 1200 665 1220 695"/>
  <path class="line-soft" d="M660 715 C690 680 705 630 725 600"/>
  <path class="line-soft" d="M945 725 C945 700 945 690 945 670"/>

  <g class="small">
    <text x="356" y="292">HTTPS</text>
    <text x="672" y="292">origin request</text>
    <text x="1170" y="318">SQL / JSON</text>
    <text x="1168" y="650">email jobs</text>
    <text x="645" y="685">tool calls</text>
    <text x="965" y="704">embedded assets</text>
  </g>

  <!-- Runtime notes -->
  <g filter="url(#softShadow)">
    <rect x="1230" y="870" width="300" height="118" rx="24" fill="#f5efe7"/>
    <text x="1260" y="912" class="eyebrow">RUNTIME CONTRACTS</text>
    <g class="body">
      <text x="1260" y="945">HTMX partials avoid full-page reloads.</text>
      <text x="1260" y="971">SQL functions keep business rules near data.</text>
    </g>
  </g>

</svg>
