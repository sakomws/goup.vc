{% extends "common/base.html" -%}

{% block jumbotron -%}
  <section class="container mx-auto max-w-5xl px-4 pt-10 pb-8 sm:px-6 lg:px-8 lg:pt-16">
    <div class="relative rounded-[2.25rem] border border-stone-200 bg-white/90 p-6 shadow-xl shadow-stone-200/50 backdrop-blur sm:p-8 lg:p-10">
      <p class="mb-4 inline-flex rounded-full border border-stone-200 bg-stone-50 px-3 py-1 text-xs font-bold uppercase tracking-[0.22em] text-stone-700">
        Docs
      </p>
      <h1 class="mb-4 text-balance text-4xl font-black tracking-[-0.045em] text-stone-950 sm:text-5xl lg:text-6xl">
        GOUP documentation
      </h1>
      <p class="max-w-2xl text-base/7 font-medium text-stone-600">
        Guides and runbooks for members, group leads, alliance managers, and project contributors.
      </p>
    </div>
  </section>
{% endblock jumbotron -%}

{% block content -%}
  <div class="container mx-auto max-w-5xl px-4 pb-12 sm:px-6 lg:px-8 lg:pb-16">
    <article class="markdown docs-markdown rounded-[2rem] border border-stone-200 bg-white p-5 shadow-xl shadow-stone-200/50 sm:p-8 lg:p-10">
      {{ content_html|safe }}
    </article>
  </div>
{% endblock content -%}
