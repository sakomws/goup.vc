apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chart.resourceNamePrefix" . }}server-config
type: Opaque
stringData:
  server.yml: |-
    db:
      host: {{ default (printf "%s-postgresql.%s" .Release.Name .Release.Namespace) .Values.db.host }}
      port: {{ .Values.db.port }}
      dbname: {{ .Values.db.dbname }}
      user: {{ .Values.db.user }}
      password: {{ .Values.db.password }}
      pool:
        max_size: {{ .Values.db.pool.maxSize }}
        timeouts:
          recycle:
            secs: {{ .Values.db.pool.recycleTimeoutSeconds }}
            nanos: 0
          wait:
            secs: {{ .Values.db.pool.waitTimeoutSeconds }}
            nanos: 0
    email:
      from_address: {{ .Values.email.fromAddress }}
      from_name: {{ .Values.email.fromName }}
      rcpts_whitelist: {{ .Values.email.rcptsWhitelist }}
      smtp:
        host: {{ .Values.email.smtp.host }}
        port: {{ .Values.email.smtp.port }}
        username: {{ .Values.email.smtp.username }}
        password: {{ .Values.email.smtp.password }}
    images:
      provider: {{ .Values.images.provider }}
{{- if eq .Values.images.provider "s3" }}
      access_key_id: {{ .Values.images.s3.accessKeyId | quote }}
      secret_access_key: {{ .Values.images.s3.secretAccessKey | quote }}
      bucket: {{ .Values.images.s3.bucket | quote }}
      region: {{ .Values.images.s3.region | quote }}
{{- if .Values.images.s3.endpoint }}
      endpoint: {{ .Values.images.s3.endpoint | quote }}
{{- else }}
      endpoint: null
{{- end }}
      force_path_style: {{ .Values.images.s3.forcePathStyle }}
{{- end }}
    log:
      format: {{ .Values.log.format }}
    meetings:
{{- if .Values.meetings.googleMeet.enabled }}
      google_meet:
        calendar_id: {{ .Values.meetings.googleMeet.calendarId | quote }}
        client_id: {{ .Values.meetings.googleMeet.clientId | quote }}
        client_secret: {{ .Values.meetings.googleMeet.clientSecret | quote }}
        enabled: {{ .Values.meetings.googleMeet.enabled }}
        max_participants: {{ .Values.meetings.googleMeet.maxParticipants }}
        refresh_token: {{ .Values.meetings.googleMeet.refreshToken | quote }}
{{- else }}
      google_meet: null
{{- end }}
{{- if .Values.meetings.zoom.enabled }}
      zoom:
        account_id: {{ .Values.meetings.zoom.accountId | quote }}
        client_id: {{ .Values.meetings.zoom.clientId | quote }}
        client_secret: {{ .Values.meetings.zoom.clientSecret | quote }}
        enabled: {{ .Values.meetings.zoom.enabled }}
        host_pool_users: {{ .Values.meetings.zoom.hostPoolUsers | toJson }}
        max_participants: {{ .Values.meetings.zoom.maxParticipants }}
        max_simultaneous_meetings_per_host: {{ .Values.meetings.zoom.maxSimultaneousMeetingsPerHost }}
        webhook_secret_token: {{ .Values.meetings.zoom.webhookSecretToken | quote }}
{{- else }}
      zoom: null
{{- end }}
{{- if .Values.payments.enabled }}
    payments:
      provider: {{ .Values.payments.provider | quote }}
      mode: {{ .Values.payments.mode | quote }}
      publishable_key: {{ .Values.payments.publishableKey | quote }}
      secret_key: {{ .Values.payments.secretKey | quote }}
      webhook_secret: {{ .Values.payments.webhookSecret | quote }}
{{- else }}
    payments: null
{{- end }}
    server:
      addr: {{ .Values.server.addr }}
      base_url: {{ .Values.server.baseUrl }}
      cookie:
        secure: {{ .Values.server.cookie.secure }}
      disable_referer_checks: {{ .Values.server.disableRefererChecks }}
      login:
        email: {{ .Values.server.login.email }}
        github: {{ .Values.server.login.github }}
        linkedin: {{ .Values.server.login.linkedin }}
      oauth2:
        github:
          auth_url: {{ .Values.server.oauth2.github.authUrl }}
          client_id: {{ .Values.server.oauth2.github.clientId | quote }}
          client_secret: {{ .Values.server.oauth2.github.clientSecret | quote }}
          redirect_uri: {{ .Values.server.oauth2.github.redirectUri }}
          scopes: {{ .Values.server.oauth2.github.scopes }}
          token_url: {{ .Values.server.oauth2.github.tokenUrl }}
      oidc:
        linkedin:
          client_id: {{ .Values.server.oidc.linkedin.clientId | quote }}
          client_secret: {{ .Values.server.oidc.linkedin.clientSecret | quote }}
          issuer_url: {{ .Values.server.oidc.linkedin.issuerUrl }}
          redirect_uri: {{ .Values.server.oidc.linkedin.redirectUri }}
          scopes: {{ .Values.server.oidc.linkedin.scopes }}
{{- if .Values.server.redirectHosts }}
      redirect_hosts:
{{- range .Values.server.redirectHosts }}
        - {{ . | quote }}
{{- end }}
{{- end }}
