{{- if .Values.mcp.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chart.resourceNamePrefix" . }}mcp-config
type: Opaque
stringData:
  MCP_BEARER_TOKEN: {{ .Values.mcp.bearerToken | quote }}
  MCP_ENABLE_MUTATIONS: {{ .Values.mcp.enableMutations | quote }}
  tern.conf: |-
    [database]
    host = {{ default (printf "%s-postgresql.%s" .Release.Name .Release.Namespace) .Values.db.host }}
    port = {{ .Values.db.port }}
    database = {{ .Values.db.dbname }}
    user = {{ .Values.db.user }}
    password = {{ .Values.db.password }}
    sslmode = prefer
{{- end }}
