# GOUP VC chart default configuration values

imagePullSecrets: []
imageTag: ""
nameOverride: ""
pullPolicy: IfNotPresent

# Enable dynamic resource name prefix
#
# Enabling the dynamic resource name prefix ensures that the resources are named dynamically based on the Helm
# installation's name. This allows multiple installations of this chart in a single Kubernetes namespace. The prefix
# can be defined by using the `fullnameOverride`.
dynamicResourceNamePrefixEnabled: false

# Overwrites the installation's fullname generation (used for the dynamic resource name prefix)
fullnameOverride: ""

# Directory path where the configuration files should be mounted
configDir: "/home/ocg/.config/ocg"

# Check database readiness init container configuration
checkDbIsReadyInitContainer:
  securityContext: {}

# Database configuration
db:
  host: ""
  port: 5432
  dbname: ocg
  user: ocg
  password: ocg
  pool:
    maxSize: 25
    recycleTimeoutSeconds: 5
    waitTimeoutSeconds: 5

# Email configuration
email:
  # From address used in emails
  fromAddress: ""
  # From name used in emails
  fromName: ""
  # Whitelisted recipient addresses (null allows all, empty list blocks all)
  rcptsWhitelist: null
  # SMTP server configuration
  smtp:
    # Hostname
    host: ""
    # Port
    port: 587
    # Username
    username: ""
    # Password
    password: ""

# Image storage configuration
images:
  # Storage provider [db|s3]
  provider: db

  # S3 provider configuration (used when provider is set to s3)
  s3:
    accessKeyId: ""
    secretAccessKey: ""
    bucket: ""
    region: ""
    endpoint: null
    forcePathStyle: true

# Log configuration
log:
  # Output format [json|pretty]
  format: json

# Meetings providers configuration (multiple providers can be enabled simultaneously)
meetings:
  # Google Meet provider configuration (set enabled to true to enable)
  googleMeet:
    enabled: false
    calendarId: primary
    clientId: ""
    clientSecret: ""
    maxParticipants: 100
    refreshToken: ""

  # Zoom provider configuration (set enabled to true to enable)
  zoom:
    enabled: false
    accountId: ""
    clientId: ""
    clientSecret: ""
    hostPoolUsers: []
    maxParticipants: 100
    maxSimultaneousMeetingsPerHost: 1
    webhookSecretToken: ""

# Payments provider configuration (a single provider can be enabled at a time)
payments:
  enabled: false
  provider: stripe
  mode: test
  publishableKey: ""
  secretKey: ""
  webhookSecret: ""

# Database migrator configuration
dbmigrator:
  job:
    containerSecurityContext: {}
    image:
      # Database migrator image repository (without the tag)
      repository: ghcr.io/sakomws/goup.vc/dbmigrator

# MCP server configuration
mcp:
  enabled: false

  # Address to listen on
  host: 0.0.0.0

  # Port to listen on
  port: 8787

  # Bearer token required for MCP requests. Leave empty to allow unauthenticated access.
  bearerToken: ""

  # Whether MCP tools that mutate application state are enabled.
  enableMutations: false

  # Ingress configuration
  ingress:
    enabled: false
    annotations:
      kubernetes.io/ingress.class: nginx
    backendServicePort: 80
    rules: []
    tls: []

  # Service configuration
  service:
    allocateLoadBalancerNodePorts: true
    annotations: {}
    ports:
      - name: http
        port: 80
        protocol: TCP
        targetPort: 8787
    type: NodePort

  # Deployment configuration
  deploy:
    containerSecurityContext: {}
    image:
      # MCP server image repository (without the tag)
      repository: ghcr.io/sakomws/goup.vc/mcp-server
    podSecurityContext: {}
    replicaCount: 1
    resources: {}
    podSecurityContext: {}

# Redirector configuration
redirector:
  enabled: false

  # Address to listen on
  addr: 0.0.0.0:9001

  # Base URL used for matched redirect targets
  baseRedirectUrl: "https://{YOUR_GOUP_SERVER_HOSTNAME}"

  # Ingress configuration
  ingress:
    enabled: false
    annotations:
      kubernetes.io/ingress.class: nginx
    backendServicePort: 80
    rules: []
    tls: []

  # Service configuration
  service:
    allocateLoadBalancerNodePorts: true
    annotations: {}
    ports:
      - name: http
        port: 80
        protocol: TCP
        targetPort: 9001
    type: NodePort

  # Deployment configuration
  deploy:
    containerSecurityContext: {}
    image:
      # Redirector image repository (without the tag)
      repository: ghcr.io/sakomws/goup.vc/redirector
    podSecurityContext: {}
    replicaCount: 1
    resources: {}

# Server configuration
server:
  # Address to listen on
  addr: 0.0.0.0:9000

  # Base URL
  baseUrl: "https://{YOUR_GOUP_SERVER_HOSTNAME}"

  # Cookie configuration
  cookie:
    secure: false

  # Disable referer checks on image endpoints
  disableRefererChecks: false

  # Login options enabled
  login:
    # Enable email login
    email: false
    # Enable GitHub login
    github: false
    # Enable LinkedIn login
    linkedin: true

  # OAuth2 configuration
  oauth2:
    # GitHub provider configuration
    github:
      # Auth URL
      authUrl: https://github.com/login/oauth/authorize
      # Client ID
      clientId: ""
      # Client secret
      clientSecret: ""
      # Redirect URI
      redirectUri: "https://{YOUR_GOUP_HOSTNAME}/log-in/oauth2/github/callback"
      # Scopes
      scopes:
        - "read:user"
        - "user:email"
      # Token URL
      tokenUrl: https://github.com/login/oauth/access_token

  # OIDC configuration
  oidc:
    # LinkedIn provider configuration
    linkedin:
      # Client ID
      clientId: ""
      # Client secret
      clientSecret: ""
      # Issuer URL
      issuerUrl: https://www.linkedin.com
      # Redirect URI
      redirectUri: "https://{YOUR_GOUP_HOSTNAME}/log-in/oidc/linkedin/callback"
      # Scopes
      scopes:
        - openid
        - profile
        - email

  # Optional list of hostnames that should redirect to baseUrl
  redirectHosts: []

  # Ingress configuration
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: nginx
    backendServicePort: 80
    rules: []
    tls: []

  # Service configuration
  service:
    allocateLoadBalancerNodePorts: true
    annotations: {}
    ports:
      - name: http
        port: 80
        protocol: TCP
        targetPort: 9000
    type: NodePort

  # Deployment configuration
  deploy:
    containerSecurityContext: {}
    image:
      # Server image repository (without the tag)
      repository: ghcr.io/sakomws/goup.vc/server
    podSecurityContext: {}
    replicaCount: 1
    resources: {}

# Values for postgresql chart dependency
postgresql:
  enabled: true
  auth:
    database: ocg
    password: ocg
    username: ocg
  global:
    security:
      allowInsecureImages: true
  image:
    registry: docker.io
    repository: artifacthub/postgres
    tag: latest
  persistence:
    mountPath: /data
  primary:
    extraVolumes:
      - name: run
        emptyDir: {}
    extraVolumeMounts:
      - name: run
        mountPath: /var/run/postgresql
